<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Баавгайн Зоог 🎈</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Nunito:wght@600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100vh;background:#f0f4ff;font-family:'Nunito',sans-serif;color:#111;overflow-x:hidden;}

/* ═══ CATEGORY SCREEN ═══════════════════════════════ */
#cat-screen{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:2rem 1rem 3rem;
  background:linear-gradient(160deg,#e8f4fd 0%,#fef9ec 50%,#fce8f3 100%);
}
.cat-title{
  font-family:'Permanent Marker',cursive;
  font-size:clamp(26px,6vw,48px);
  color:#1a1a2e;
  text-align:center;
  margin-bottom:.3rem;
  letter-spacing:.02em;
}
.cat-sub{font-size:clamp(13px,3vw,16px);color:#666;text-align:center;margin-bottom:2rem;}
.cat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;
  width:100%;
  max-width:700px;
}
.cat-card{
  background:#fff;
  border:2.5px solid #e0e0e0;
  border-radius:18px;
  padding:1.2rem .8rem 1rem;
  text-align:center;
  cursor:pointer;
  transition:transform .18s,border-color .18s,box-shadow .18s;
  box-shadow:0 3px 0 #e0e0e0;
  user-select:none;
}
.cat-card:hover{transform:translateY(-4px);box-shadow:0 7px 0 #ccc;}
.cat-card:active{transform:translateY(1px);box-shadow:0 2px 0 #ccc;}
.cat-emoji{font-size:2.4rem;margin-bottom:.5rem;display:block;line-height:1;}
.cat-name{font-size:14px;font-weight:900;color:#1a1a2e;letter-spacing:.02em;}
.cat-count{font-size:11px;color:#aaa;margin-top:2px;}
.cat-card.selected{border-color:var(--clr);box-shadow:0 4px 0 var(--clr);}

.start-btn{
  margin-top:2rem;
  padding:16px 48px;
  background:#1a1a2e;color:#fff;
  font-family:'Permanent Marker',cursive;
  font-size:20px;letter-spacing:.04em;
  border:none;border-radius:16px;cursor:pointer;
  box-shadow:0 5px 0 #000;
  transition:transform .1s,box-shadow .1s;
  display:none;
}
.start-btn.show{display:block;}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 7px 0 #000;}
.start-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #000;}

/* ═══ GAME SCREEN ════════════════════════════════════ */
#game-screen{display:none;flex-direction:column;max-width:900px;margin:0 auto;min-height:100vh;}

.top-bar{
  display:flex;align-items:center;justify-content:center;
  padding:12px 16px 10px;position:relative;
  border-bottom:2.5px dashed #ccc;
  background:#fff;
}
.back-btn{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:42px;height:42px;border:2.5px solid #222;border-radius:10px;
  background:#fff;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s;
}
.back-btn:hover{background:#f0f0f0;}
.page-title{font-family:'Permanent Marker',cursive;font-size:clamp(15px,3vw,22px);color:#222;text-align:center;}

.score-bar{
  padding:8px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  border-bottom:2px dashed #ddd;background:#fff;
}
.chip{border:2.5px solid #222;border-radius:50px;padding:4px 14px;font-size:12px;font-weight:900;display:flex;align-items:center;gap:5px;background:#fff;}
.chip.cat-chip{background:#1a1a2e;color:#fff;border-color:#1a1a2e;}
.wrong-chip{margin-left:auto;font-size:12px;color:#888;}
.wrong-chip b{color:#e53e3e;}

.word-row{
  display:flex;justify-content:center;align-items:flex-end;gap:8px;
  padding:14px 16px 12px;border-bottom:2.5px dashed #ddd;
  flex-wrap:wrap;background:#fff;
}
.dash-slot{display:flex;flex-direction:column;align-items:center;gap:4px;}
.dash-letter{
  font-family:'Permanent Marker',cursive;
  font-size:clamp(18px,4vw,30px);color:#111;
  min-width:28px;text-align:center;min-height:32px;line-height:1;
  transition:transform .2s;
}
.dash-letter.pop{animation:letterPop .3s ease;}
@keyframes letterPop{0%{transform:scale(0) rotate(-10deg);opacity:0;}70%{transform:scale(1.3) rotate(3deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.dash-line{width:28px;height:3px;background:#111;border-radius:2px;}
.dash-slot.wrong-reveal .dash-letter{color:#e53e3e;}

.main-area{display:flex;flex:1;min-height:0;padding:8px 8px 0;gap:0;}

/* Keyboard */
.keyboard-panel{flex:0 0 auto;padding:8px 6px 0 4px;display:flex;flex-direction:column;}
.kb-row{display:flex;gap:0;}
.key{
  width:clamp(38px,5.8vw,54px);height:clamp(38px,5.8vw,54px);
  border:2.5px solid #111;background:#fff;
  font-family:'Bebas Neue',cursive;font-size:clamp(14px,2.2vw,20px);color:#111;letter-spacing:.04em;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  margin:-1.25px -1.25px 0 0;
  transition:background .1s,color .1s;user-select:none;position:relative;z-index:1;
}
.key:hover:not(.used){background:#f0f0f0;z-index:2;}
.key:active:not(.used){background:#e0e0e0;}
.key.correct{background:#1a1a2e;color:#fff;pointer-events:none;}
.key.wrong{background:#f0f0f0;color:#bbb;pointer-events:none;text-decoration:line-through;}

/* Scene */
.scene-panel{flex:1;position:relative;min-height:300px;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;}
.trees{position:absolute;bottom:0;right:0;width:55%;height:100%;display:flex;align-items:flex-end;justify-content:flex-end;pointer-events:none;opacity:.1;}
.tree{width:clamp(36px,7vw,64px);background:#111;border-radius:8px 8px 0 0;margin-right:4px;}
.tree1{height:75%}.tree2{height:92%}.tree3{height:58%}

.person-wrap{position:absolute;bottom:clamp(80px,16vw,150px);left:54%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;transition:transform .5s;}
.person-wrap.falling{animation:personFall .9s ease-in forwards;}
@keyframes personFall{0%{transform:translateX(-50%) translateY(0) rotate(0);}60%{transform:translateX(-20%) translateY(30px) rotate(20deg);}100%{transform:translateX(20%) translateY(120px) rotate(40deg) scale(.5);opacity:0;}}

.balloons-wrap{display:flex;gap:clamp(3px,.8vw,7px);align-items:flex-end;}
.balloon-item{display:flex;flex-direction:column;align-items:center;}
.balloon-body{
  width:clamp(22px,3.8vw,34px);height:clamp(28px,4.8vw,42px);
  border-radius:50% 50% 50% 50%/55% 55% 45% 45%;
  position:relative;animation:floatB 2.5s ease-in-out infinite;
}
.balloon-body::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:5px;height:5px;background:inherit;border-radius:50%;}
.balloon-string-line{width:1px;height:clamp(16px,2.5vw,26px);background:rgba(0,0,0,.3);}
.balloon-item.popped .balloon-body{animation:popB .25s ease forwards!important;}
@keyframes popB{0%{transform:scale(1);opacity:1;}60%{transform:scale(1.7);opacity:.4;}100%{transform:scale(0);opacity:0;}}
@keyframes floatB{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-6px) rotate(2deg);}}
.bc0{background:#c0392b;box-shadow:inset -4px -5px 0 rgba(0,0,0,.12);}
.bc1{background:#8e44ad;box-shadow:inset -4px -5px 0 rgba(0,0,0,.10);}
.bc2{background:#27ae60;box-shadow:inset -4px -5px 0 rgba(0,0,0,.12);}
.bc3{background:#2980b9;box-shadow:inset -4px -5px 0 rgba(0,0,0,.12);}
.bc4{background:#e67e22;box-shadow:inset -4px -5px 0 rgba(0,0,0,.12);}
.bc5{background:#d35400;box-shadow:inset -4px -5px 0 rgba(0,0,0,.12);}

.bundle-svg{width:clamp(16px,2.5vw,26px);height:clamp(14px,2vw,20px);margin-top:-2px;}
.person-svg{width:clamp(46px,8vw,70px);height:auto;display:block;}

.bear-wrap{position:absolute;bottom:0;left:54%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;}
.bear-svg{width:clamp(65px,13vw,110px);height:auto;display:block;filter:drop-shadow(0 3px 6px rgba(0,0,0,.15));}
.bear-wrap.nom .bear-svg{animation:bearNom .5s ease;}
@keyframes bearNom{0%,100%{transform:scale(1);}30%{transform:scale(1.25) translateY(-8px);}60%{transform:scale(.9);}}

.ground{position:absolute;bottom:0;left:0;right:0;height:clamp(28px,5vw,44px);background:linear-gradient(180deg,#d4e8b0 0%,#a8cc6a 100%);}
.ground::before{content:'🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱';position:absolute;top:-10px;left:0;right:0;font-size:16px;letter-spacing:2px;white-space:nowrap;overflow:hidden;}

.question-box{
  background:#fffbec;
  border-top:2.5px dashed #f0c040;
  border-bottom:2.5px dashed #f0c040;
  padding:14px 18px;
  display:flex;flex-direction:column;gap:8px;
}
.question-label{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#f0a000;}
.question-text{font-size:clamp(15px,2.8vw,20px);font-weight:900;color:#1a1a2e;line-height:1.5;}
.hint-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px;}
.hint-cat{font-size:11px;font-weight:900;background:#1a1a2e;color:#fff;border-radius:50px;padding:3px 12px;white-space:nowrap;}
.hint-btn{
  padding:5px 14px;border-radius:50px;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;
  cursor:pointer;border:2px solid #111;background:#fff;
  transition:background .12s,transform .1s;
  display:flex;align-items:center;gap:4px;
}
.hint-btn:hover{background:#f5f5f5;}
.hint-btn:active{transform:scale(.95);}
.hint-btn.used{opacity:.4;pointer-events:none;}
.hint-bubble{
  background:#fff;border:2px solid #e0e0e0;border-radius:12px;
  padding:8px 14px;font-size:13px;color:#555;line-height:1.5;
  display:none;animation:popIn .2s ease;
}
.hint-bubble.show{display:block;}
.hint-text{font-size:13px;color:#555;line-height:1.5;flex:1;}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:1.5rem;backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.show{opacity:1;pointer-events:all;}
.result-card{background:#fff;border:3px solid #111;border-radius:20px;padding:1.8rem 1.5rem;max-width:360px;width:100%;text-align:center;transform:scale(.85);transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:6px 6px 0 #111;}
.overlay.show .result-card{transform:scale(1);}
.res-big{font-size:3rem;margin-bottom:.4rem;}
.res-title{font-family:'Permanent Marker',cursive;font-size:1.7rem;margin-bottom:.4rem;}
.res-word{font-size:14px;color:#666;margin-bottom:.3rem;}
.res-word strong{color:#111;font-size:16px;}
.res-info{font-size:13px;color:#aaa;margin-bottom:1.3rem;}
.res-info strong{color:#111;}
.res-btns{display:flex;gap:10px;}
.res-btn{flex:1;padding:13px;border-radius:12px;font-family:'Permanent Marker',cursive;font-size:15px;cursor:pointer;border:2.5px solid #111;transition:transform .1s,box-shadow .1s;}
.res-btn.primary{background:#1a1a2e;color:#fff;box-shadow:0 4px 0 #000;}
.res-btn.primary:hover{transform:translateY(-2px);box-shadow:0 6px 0 #000;}
.res-btn.secondary{background:#fff;color:#111;box-shadow:0 4px 0 #aaa;}
.res-btn.secondary:hover{transform:translateY(-2px);box-shadow:0 6px 0 #aaa;}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a2e;color:#fff;border-radius:50px;padding:10px 22px;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s,transform .2s;z-index:200;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Pop particle */
.pop-p{position:fixed;pointer-events:none;z-index:99;animation:pflt .7s ease forwards;}
@keyframes pflt{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-55px) scale(.3);opacity:0;}}

/* Flash */
.flash{position:fixed;inset:0;pointer-events:none;z-index:98;animation:fout .5s ease forwards;}
@keyframes fout{from{opacity:1}to{opacity:0}}

/* Confetti particle */
.conf{position:fixed;pointer-events:none;z-index:97;width:8px;height:8px;border-radius:2px;animation:confFall linear forwards;}
@keyframes confFall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

@keyframes popIn{from{transform:scale(.5) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

@media(max-width:480px){
  .main-area{flex-direction:column;}
  .keyboard-panel{padding:6px 4px 0;order:2;}
  .kb-row{justify-content:center;}
  .scene-panel{min-height:200px;order:1;}
  .person-wrap{left:52%;bottom:clamp(60px,20vw,110px);}
  .bear-wrap{left:52%;}
  .key{width:clamp(34px,8.5vw,48px);height:clamp(34px,8.5vw,48px);font-size:clamp(11px,2.5vw,15px);}
}
</style>
</head>
<body>

<!-- ═══ CATEGORY SCREEN ═══════════════════════════════ -->
<div id="cat-screen">
  <div style="font-size:3rem;margin-bottom:.5rem;">🎈</div>
  <div class="cat-title">Баавгайн Зоог</div>
  <div class="cat-sub">Ангилал сонгоод тоглоомоо эхлүүл!</div>
  <div class="cat-grid" id="cat-grid"></div>
  <button class="start-btn" id="start-btn" onclick="startGame()">Тоглоом эхлэх ➜</button>
</div>

<!-- ═══ GAME SCREEN ════════════════════════════════════ -->
<div id="game-screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="page-title" id="page-title">Баавгайн Зоог</div>
  </div>

  <div class="score-bar">
    <div class="chip cat-chip" id="cat-chip">—</div>
    <div class="chip">⭐ <span id="score-val">0</span></div>
    <div class="chip">🔥 <span id="streak-val">0</span></div>
    <div class="wrong-chip">Буруу: <b id="wrong-val">0</b>/6</div>
  </div>

  <div class="word-row" id="word-row"></div>

  <div class="main-area">
    <div class="keyboard-panel" id="kb-panel"></div>
    <div class="scene-panel">
      <div class="trees"><div class="tree tree1"></div><div class="tree tree2"></div><div class="tree tree3"></div></div>
      <div class="person-wrap" id="person-wrap">
        <div class="balloons-wrap" id="balloons-wrap">
          <div class="balloon-item" id="bi0"><div class="balloon-body bc0" id="bb0"></div><div class="balloon-string-line"></div></div>
          <div class="balloon-item" id="bi1"><div class="balloon-body bc1" id="bb1"></div><div class="balloon-string-line"></div></div>
          <div class="balloon-item" id="bi2"><div class="balloon-body bc2" id="bb2"></div><div class="balloon-string-line"></div></div>
          <div class="balloon-item" id="bi3"><div class="balloon-body bc3" id="bb3"></div><div class="balloon-string-line"></div></div>
          <div class="balloon-item" id="bi4"><div class="balloon-body bc4" id="bb4"></div><div class="balloon-string-line"></div></div>
          <div class="balloon-item" id="bi5"><div class="balloon-body bc5" id="bb5"></div><div class="balloon-string-line"></div></div>
        </div>
        <svg class="bundle-svg" viewBox="0 0 26 20" fill="none">
          <line x1="3" y1="0" x2="13" y2="20" stroke="#555" stroke-width="1"/>
          <line x1="8" y1="0" x2="13" y2="20" stroke="#555" stroke-width="1"/>
          <line x1="13" y1="0" x2="13" y2="20" stroke="#555" stroke-width="1"/>
          <line x1="18" y1="0" x2="13" y2="20" stroke="#555" stroke-width="1"/>
          <line x1="23" y1="0" x2="13" y2="20" stroke="#555" stroke-width="1"/>
        </svg>
        <svg class="person-svg" viewBox="0 0 60 90" fill="none">
          <circle cx="30" cy="14" r="12" fill="#fff" stroke="#111" stroke-width="3"/>
          <circle cx="25" cy="12" r="2" fill="#111" id="eye-l"/>
          <circle cx="35" cy="12" r="2" fill="#111" id="eye-r"/>
          <path id="mouth" d="M25 18 Q30 22 35 18" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M18 8 Q30 2 42 8" stroke="#111" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <line x1="30" y1="26" x2="30" y2="62" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M22 32 Q30 36 38 32" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
          <line x1="30" y1="38" x2="12" y2="26" stroke="#111" stroke-width="3" stroke-linecap="round"/>
          <line x1="30" y1="38" x2="48" y2="26" stroke="#111" stroke-width="3" stroke-linecap="round"/>
          <line x1="30" y1="62" x2="18" y2="80" stroke="#111" stroke-width="3" stroke-linecap="round"/>
          <line x1="30" y1="62" x2="42" y2="80" stroke="#111" stroke-width="3" stroke-linecap="round"/>
          <ellipse cx="16" cy="82" rx="6" ry="4" fill="#111"/>
          <ellipse cx="44" cy="82" rx="6" ry="4" fill="#111"/>
        </svg>
      </div>
      <div class="bear-wrap" id="bear-wrap">
        <svg class="bear-svg" viewBox="0 0 120 130" fill="none">
          <ellipse cx="60" cy="126" rx="38" ry="6" fill="rgba(0,0,0,0.1)"/>
          <ellipse cx="60" cy="92" rx="36" ry="32" fill="#4a3728"/>
          <ellipse cx="60" cy="98" rx="22" ry="20" fill="#7a5c48"/>
          <ellipse cx="40" cy="118" rx="12" ry="8" fill="#4a3728"/>
          <ellipse cx="80" cy="118" rx="12" ry="8" fill="#4a3728"/>
          <ellipse cx="22" cy="90" rx="9" ry="14" fill="#4a3728" transform="rotate(-15 22 90)"/>
          <ellipse cx="98" cy="90" rx="9" ry="14" fill="#4a3728" transform="rotate(15 98 90)"/>
          <ellipse cx="18" cy="100" rx="8" ry="6" fill="#3a2a1e"/>
          <ellipse cx="102" cy="100" rx="8" ry="6" fill="#3a2a1e"/>
          <circle cx="60" cy="52" r="30" fill="#4a3728"/>
          <circle cx="34" cy="26" r="12" fill="#4a3728"/>
          <circle cx="34" cy="26" r="7" fill="#7a5c48"/>
          <circle cx="86" cy="26" r="12" fill="#4a3728"/>
          <circle cx="86" cy="26" r="7" fill="#7a5c48"/>
          <ellipse cx="60" cy="62" rx="16" ry="12" fill="#7a5c48"/>
          <ellipse cx="60" cy="56" rx="6" ry="4" fill="#2a1a10"/>
          <ellipse cx="58" cy="54.5" rx="2" ry="1.5" fill="rgba(255,255,255,0.35)"/>
          <circle cx="46" cy="46" r="5" fill="#fff"/>
          <circle cx="74" cy="46" r="5" fill="#fff"/>
          <circle cx="47" cy="46" r="3" fill="#1a0a00" id="bear-eye-l"/>
          <circle cx="75" cy="46" r="3" fill="#1a0a00" id="bear-eye-r"/>
          <circle cx="48.5" cy="44.5" r="1.2" fill="#fff"/>
          <circle cx="76.5" cy="44.5" r="1.2" fill="#fff"/>
          <path id="bear-mouth" d="M52 66 Q60 72 68 66" stroke="#2a1a10" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <ellipse cx="40" cy="56" rx="7" ry="4" fill="rgba(220,80,80,0.22)"/>
          <ellipse cx="80" cy="56" rx="7" ry="4" fill="rgba(220,80,80,0.22)"/>
          <circle cx="60" cy="104" r="3" fill="#3a2a1e"/>
        </svg>
      </div>
      <div class="ground"></div>
    </div>
  </div>

  <div class="question-box">
    <div class="question-label">❓ Асуулт</div>
    <div class="question-text" id="hint-text">...</div>
    <div class="hint-row">
      <div class="hint-cat" id="hint-cat-tag">—</div>
      <button class="hint-btn" id="hbtn1" onclick="showHint(1)">💡 Дохио 1</button>
      <button class="hint-btn" id="hbtn2" onclick="showHint(2)">💡 Дохио 2</button>
      <button class="hint-btn" id="hbtn3" onclick="showHint(3)">💡 Дохио 3</button>
    </div>
    <div class="hint-bubble" id="hint-bubble"></div>
  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="res-big" id="res-emoji">🎉</div>
    <div class="res-title" id="res-title">Баяр хүргэе!</div>
    <div class="res-word" id="res-word"></div>
    <div class="res-info" id="res-info"></div>

function pt(f,t,d,v,delay,bend){
  try{
    const o=AC.createOscillator(),g=AC.createGain(),c=AC.currentTime+(delay||0);
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.setValueAtTime(f,c);
    if(bend) o.frequency.exponentialRampToValueAtTime(bend,c+d*.7);
    g.gain.setValueAtTime(v||.18,c);
    g.gain.exponentialRampToValueAtTime(.001,c+d);
    o.start(c);o.stop(c+d);
  }catch(e){}
}

  });
}

function selectCat(id, card){
  sfx.key();
  document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('selected'));
  card.classList.add('selected');
  selCat=id;
  document.getElementById('start-btn').classList.add('show');
}

function startGame(){
  if(!selCat) return;
  sfx.start();
  document.getElementById('cat-screen').style.display='none';
  const gs=document.getElementById('game-screen');
  gs.style.display='flex';
  score=0; streak=0;
  document.getElementById('score-val').textContent=0;
  document.getElementById('streak-val').textContent=0;
  const cat=CATEGORIES.find(c=>c.id===selCat);
  document.getElementById('cat-chip').textContent=cat.emoji+' '+cat.name;
  document.getElementById('page-title').textContent=cat.name+' — Үг Таах';
  loadWord();
}

function goBack(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('game-screen').style.display='none';
  document.getElementById('cat-screen').style.display='flex';
  selCat=null;
  document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('start-btn').classList.remove('show');
}

let curHints=[], hintsUsed=0;

/* ═══ GAME LOGIC ══════════════════════════════════════ */
function loadWord(){
  document.getElementById('overlay').classList.remove('show');
  const cat=CATEGORIES.find(c=>c.id===selCat);
  if(!used[selCat]) used[selCat]=[];
  if(used[selCat].length>=cat.words.length) used[selCat]=[];
  let idx;
  do{idx=Math.floor(Math.random()*cat.words.length);}while(used[selCat].includes(idx));
  used[selCat].push(idx);
  const entry=cat.words[idx];
  curWord=entry.w.toUpperCase();
  guessed=new Set(); wrongCount=0; gameOver=false; hintsUsed=0;
  document.getElementById('wrong-val').textContent=0;
  document.getElementById('hint-cat-tag').textContent=cat.emoji+' '+cat.name;
  document.getElementById('hint-text').textContent=entry.h;
  // Build 3 hints from word
  curHints=buildHints(entry);
  // Reset hint buttons
  for(let i=1;i<=3;i++){
    const b=document.getElementById('hbtn'+i);
    b.classList.remove('used');
    b.textContent='💡 Дохио '+i;
  }
  document.getElementById('hint-bubble').classList.remove('show');
  document.getElementById('hint-bubble').textContent='';
  resetScene(); renderWord(); renderKB();
}

function buildHints(entry){
  const w=entry.w.toUpperCase();
  const len=w.length;
  // Hint 1: word length
  const h1='Үгийн урт: '+len+' үсэгтэй';
  // Hint 2: first letter
  const h2='Эхний үсэг: "'+w[0]+'"';
  // Hint 3: last letter
  const h3='Сүүлийн үсэг: "'+w[len-1]+'"';
  return [h1,h2,h3];
}

function showHint(n){
  if(hintsUsed>=n) return;
  sfx.key();
  hintsUsed=n;
  // Mark used buttons
  for(let i=1;i<=n;i++) document.getElementById('hbtn'+i).classList.add('used');
  const bubble=document.getElementById('hint-bubble');
  bubble.textContent='💡 '+curHints[n-1];
  bubble.classList.add('show');
  // Deduct points for using hints
  score=Math.max(0,score-3);
  document.getElementById('score-val').textContent=score;
  showToast('-3 оноо (Дохио '+n+')');
}

function renderWord(){
  const row=document.getElementById('word-row');
  row.innerHTML='';
  curWord.split('').forEach(ch=>{
    const slot=document.createElement('div');
    slot.className='dash-slot';
    const letter=document.createElement('div');
    letter.className='dash-letter';
    if(guessed.has(ch)){letter.textContent=ch;}
    const line=document.createElement('div');
    line.className='dash-line';
    slot.appendChild(letter); slot.appendChild(line);
    row.appendChild(slot);
  });
}

function refreshWord(){
  const slots=document.querySelectorAll('#word-row .dash-slot');
  curWord.split('').forEach((ch,i)=>{
    if(guessed.has(ch)){
      const l=slots[i].querySelector('.dash-letter');
      if(!l.textContent){
        l.textContent=ch;
        l.style.animation='none';
        requestAnimationFrame(()=>{l.style.animation='letterPop .3s ease';});
      }
    }
  });
}

function revealAll(){
  const slots=document.querySelectorAll('#word-row .dash-slot');
  curWord.split('').forEach((ch,i)=>{
    const l=slots[i].querySelector('.dash-letter');
    l.textContent=ch;
    if(!guessed.has(ch)) slots[i].classList.add('wrong-reveal');
  });
}

function renderKB(){
  const panel=document.getElementById('kb-panel');
  panel.innerHTML='';
  MN_KB.forEach(row=>{
    const rowDiv=document.createElement('div');
    rowDiv.className='kb-row';
    row.forEach(ch=>{
      const btn=document.createElement('div');
      btn.className='key'; btn.textContent=ch; btn.id='key-'+ch;
      if(guessed.has(ch)) btn.classList.add(curWord.includes(ch)?'correct':'wrong');
      btn.addEventListener('click',()=>guess(ch));
      btn.addEventListener('touchend',e=>{e.preventDefault();guess(ch);});
      rowDiv.appendChild(btn);
    });
    panel.appendChild(rowDiv);
  });
}

function guess(ch){
  if(guessed.has(ch)||gameOver) return;
  sfx.key();
  guessed.add(ch);
  const btn=document.getElementById('key-'+ch);
  if(curWord.includes(ch)){
    sfx.right();
    if(btn) btn.classList.add('correct');
    refreshWord();
    if(curWord.split('').every(c=>guessed.has(c))) setTimeout(winGame,350);
  } else {
    sfx.wrong();
    wrongCount++;
    document.getElementById('wrong-val').textContent=wrongCount;
    if(btn) btn.classList.add('wrong');
    popBalloon(wrongCount-1);
    if(wrongCount>=MAX_WRONG) setTimeout(loseGame,650);
  }
}

/* ═══ SCENE ══════════════════════════════════════════ */
function resetScene(){
  for(let i=0;i<6;i++){
    const bi=document.getElementById('bi'+i);
    bi.classList.remove('popped');
    bi.style.visibility='visible';
    bi.querySelector('.balloon-string-line').style.visibility='visible';
  }
  const pw=document.getElementById('person-wrap');
  pw.style.transform='translateX(-50%)';
  pw.classList.remove('falling');
  document.getElementById('mouth').setAttribute('d','M25 18 Q30 22 35 18');
  document.getElementById('eye-l').setAttribute('r','2');
  document.getElementById('eye-r').setAttribute('r','2');
  resetBearFace();
}

function popBalloon(idx){
  sfx.pop();
  const bi=document.getElementById('bi'+idx);
  const bb=document.getElementById('bb'+idx);
  bi.classList.add('popped');
  // particles
  const rect=bb.getBoundingClientRect();
  ['💥','✨','💨'].forEach((em,i)=>{
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='pop-p'; p.textContent=em;
      p.style.left=(rect.left+rect.width/2-10+(i-1)*20)+'px';
      p.style.top=rect.top+'px';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),700);
    },i*55);
  });
  // screen flash
  const fl=document.createElement('div');
  fl.className='flash'; fl.style.background='rgba(220,50,50,.12)';
  document.body.appendChild(fl); setTimeout(()=>fl.remove(),500);
  setTimeout(()=>bi.style.visibility='hidden',280);
  // tilt person
  document.getElementById('person-wrap').style.transform=`translateX(-50%) rotate(${wrongCount*8}deg) translateY(${wrongCount*3}px)`;
  // bear nom
  setTimeout(()=>{
    const bw=document.getElementById('bear-wrap');
    bw.classList.add('nom');
    setBearHungry(wrongCount);
    setTimeout(()=>bw.classList.remove('nom'),500);
  },380);
}

function setBearHungry(n){
  const m=document.getElementById('bear-mouth');
  const el=document.getElementById('bear-eye-l');
  const er=document.getElementById('bear-eye-r');
  if(n>=5){ m.setAttribute('d','M48 62 Q60 76 72 62'); el.setAttribute('r','4.5'); er.setAttribute('r','4.5'); }
  else if(n>=3){ m.setAttribute('d','M50 64 Q60 74 70 64'); el.setAttribute('r','4'); er.setAttribute('r','4'); }
  else if(n>=1){ m.setAttribute('d','M51 65 Q60 71 69 65'); }
}

function resetBearFace(){
  document.getElementById('bear-mouth').setAttribute('d','M52 66 Q60 72 68 66');
  document.getElementById('bear-eye-l').setAttribute('r','3');
  document.getElementById('bear-eye-r').setAttribute('r','3');
}

/* ═══ WIN / LOSE ══════════════════════════════════════ */
function winGame(){
  gameOver=true; sfx.win();
  const pts=Math.max(10,(MAX_WRONG-wrongCount+1)*15);
  score+=pts; streak++;
  document.getElementById('score-val').textContent=score;
  document.getElementById('streak-val').textContent=streak;
  spawnConfetti();
  document.getElementById('res-emoji').textContent=wrongCount===0?'🏆':'🎉';
  document.getElementById('res-title').textContent=wrongCount===0?'Төгс! Алдаагүй!':'Зөв таалаа!';
  document.getElementById('res-word').innerHTML='Үг: <strong>'+curWord+'</strong>';
  document.getElementById('res-info').innerHTML='Оноо: <strong>+'+pts+'</strong> · Нийт: <strong>'+score+'</strong>';
  setTimeout(()=>document.getElementById('overlay').classList.add('show'),500);
}

function loseGame(){
  gameOver=true; sfx.lose(); streak=0;
  document.getElementById('streak-val').textContent=0;
  const pw=document.getElementById('person-wrap');
  pw.classList.add('falling');
  document.getElementById('mouth').setAttribute('d','M25 20 Q30 16 35 20');
  setTimeout(()=>{
    const bw=document.getElementById('bear-wrap');
    bw.classList.add('nom');
    document.getElementById('bear-mouth').setAttribute('d','M48 62 Q60 76 72 62');
    document.getElementById('bear-eye-l').setAttribute('r','5');
    document.getElementById('bear-eye-r').setAttribute('r','5');
    setTimeout(()=>bw.classList.remove('nom'),600);
  },500);
  revealAll();
  document.getElementById('res-emoji').textContent='💀';
  document.getElementById('res-title').textContent='Баавгайд идүүллээ!';
  document.getElementById('res-word').innerHTML='Зөв үг: <strong>'+curWord+'</strong>';
  document.getElementById('res-info').innerHTML='Нийт оноо: <strong>'+score+'</strong>';
  setTimeout(()=>document.getElementById('overlay').classList.add('show'),950);
}

/* ═══ CONFETTI ════════════════════════════════════════ */
function spawnConfetti(){
  const colors=['#f97316','#22c55e','#3b82f6','#a855f7','#ec4899','#eab308'];
  for(let i=0;i<28;i++){
    setTimeout(()=>{
      const c=document.createElement('div');
      c.className='conf';
      c.style.left=Math.random()*100+'vw';
      c.style.background=colors[Math.floor(Math.random()*colors.length)];
      c.style.animationDuration=(1.2+Math.random()*.8)+'s';
      c.style.animationDelay=(Math.random()*.4)+'s';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),2500);
    },i*40);
  }
}

/* ═══ TOAST ═══════════════════════════════════════════ */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ═══ KEYBOARD INPUT ══════════════════════════════════ */
document.addEventListener('keydown',e=>{
  const ch=e.key.toUpperCase();
  if(ALL_MN.includes(ch)&&!guessed.has(ch)) guess(ch);
});

/* ═══ INIT ════════════════════════════════════════════ */
buildCatScreen();
</script>
